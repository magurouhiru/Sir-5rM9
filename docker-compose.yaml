services:
  bot:
    image: sir_5rm9_bot:latest
    environment:
      - DEV_MODE=on
      - with_ocr_server=on
      - with_gcp_token=off
      - ocr_server_path=http://ocr
    secrets:
      - DISCORD_TOKEN
  ocr:
    image: sir_5rm9_ocr:latest
    ports:
      - "8000:80"

secrets:
  DISCORD_TOKEN:
    file: ./discord_token.txt
