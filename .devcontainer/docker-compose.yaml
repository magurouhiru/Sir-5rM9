services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    tty: true
    environment:
      - APP_ENV=development
    secrets:
      - DISCORD_TOKEN
    volumes:
      - ..:/home/vscode/app
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all # すべてのGPUを指定
              capabilities: [ gpu ] # 必須設定
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:


secrets:
  DISCORD_TOKEN:
    file: ../discord_token.txt
