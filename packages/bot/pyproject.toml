[project]
name = "bot"
version = "0.1.0"
description = "Discord の Bot"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["torch", "torchvision ", "discord>=2.3.2", "easyocr>=1.7.2"]

[dependency-groups]
dev = ["ruff>=0.15.6"]

[tool.uv.sources]
torch = { index = "pytorch-cpu" }       # torchだけCPU版サイトを見に行く
torchvision = { index = "pytorch-cpu" } # torchだけCPU版サイトを見に行く

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
